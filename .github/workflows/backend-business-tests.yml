name: Backend business tests

on:
  push:
    paths:
      - 'trungtamtrienlam-BE/**'
      - '.github/workflows/backend-business-tests.yml'
  pull_request:
    paths:
      - 'trungtamtrienlam-BE/**'
      - '.github/workflows/backend-business-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-business-tests-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: trungtamtrienlam-BE

jobs:
  business-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trungtamtrienlam_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres-ci-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d trungtamtrienlam_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test_postgres
      DB_NAME: trungtamtrienlam_ci
      TEST_DB_NAME: test_trungtamtrienlam_ci
      DB_USER: postgres
      DB_PASSWORD: postgres-ci-only
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            trungtamtrienlam-BE/requirements.txt
            trungtamtrienlam-BE/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run PostgreSQL system checks
        run: python manage.py check

      - name: Run existing business-flow tests
        run: >-
          python manage.py test
          apps.accounts.tests
          apps.chats.tests
          apps.monuments.tests
          --verbosity=2
