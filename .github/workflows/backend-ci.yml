name: Backend CI

on:
  push:
    paths:
      - 'trungtamtrienlam-BE/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'trungtamtrienlam-BE/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: trungtamtrienlam-BE

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            trungtamtrienlam-BE/requirements.txt
            trungtamtrienlam-BE/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall -q apps config core tests

      - name: Lint infrastructure scaffold
        run: >-
          python -m flake8
          tests
          config/celery.py
          config/settings/test.py
          config/settings/test_postgres.py
          core/health.py

      - name: Run Django system checks
        run: python manage.py check --settings=config.settings.test

      - name: Validate production Compose structure
        run: >-
          docker compose
          --env-file deploy/env.production.example
          -f docker-compose.yml
          -f docker-compose.prod.yml
          config --quiet

      - name: Verify migration state
        run: python manage.py makemigrations --check --dry-run --settings=config.settings.test

      - name: Run service-free smoke tests
        run: python -m pytest
