name: Hotfix Release Production

on: [ workflow_dispatch ]

concurrency:
  group: hotfix-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  create-docker-image:
    runs-on: ubuntu-latest
    container:
      image: docker:latest
      env:
        LD_LIBRARY_PATH: /lib
        STAGING_REGISTRY_IMAGE: ${{ secrets.STAGING_AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.STAGING_AWS_DEFAULT_REGION }}.amazonaws.com/${{ github.repository }}
        PRODUCTION_REGISTRY_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/${{ github.repository }}
        COMMIT_TIME: ${{ github.event.repository.pushed_at }}

    services:
      docker:
        image: docker:dind

    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/ecr
      - run: |
          echo $COMMIT_TIME
          echo ${{ github.event.repository.pushed_at }}
      - name: Login ECR Production
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com
          username: ${{ secrets.AWS_ACCESS_KEY_ID }}
          password: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Build docker image production
        run: |
          echo $COMMIT_TIME
          export VERSION=$(sh ./deploy/github/get_version.sh)
          echo "$VERSION"
          export REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
          docker build --build-arg BUILDKIT_INLINE_CACHE=1 --build-arg BUILD_ENV=prod --cache-from $PRODUCTION_REGISTRY_IMAGE:latest -t $PRODUCTION_REGISTRY_IMAGE:$VERSION .
      - name: Push docker image production
        run: |
          export VERSION=$(sh ./deploy/github/get_version.sh)
          echo "$VERSION"
          docker push $PRODUCTION_REGISTRY_IMAGE:$VERSION
      - name: Tag docker image production latest
        run: |
          export VERSION=$(sh ./deploy/github/get_version.sh)
          echo "$VERSION"
          docker tag $PRODUCTION_REGISTRY_IMAGE:$VERSION $PRODUCTION_REGISTRY_IMAGE:latest
      - name: Push docker image production latest
        run: docker push $PRODUCTION_REGISTRY_IMAGE:latest

  make-tag-production:
    runs-on: ubuntu-latest
    container: python:3.12-slim-bullseye
    needs:
      - create-docker-image
    steps:
      - uses: actions/checkout@v3
      - name: Set version
        id: version-release
        run: echo "version=$(bash ./deploy/github/get_version.sh)" >> $GITHUB_OUTPUT
        env:
          COMMIT_TIME: ${{ github.event.repository.pushed_at }}
      - uses: tvdias/github-tagger@v0.0.1
        with:
          repo-token: ${{ secrets.DEPLOY_PAT_TOKEN }}
          tag: 'v${{ steps.version-release.outputs.version }}'
