x-production-environment: &production-environment
  DJANGO_SETTINGS_MODULE: config.settings.production
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}

services:
  web:
    environment:
      <<: *production-environment
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
      RUN_COLLECTSTATIC: ${RUN_COLLECTSTATIC:-false}

  celery_worker:
    environment:
      <<: *production-environment
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "false"

  celery_beat:
    environment:
      <<: *production-environment
      RUN_MIGRATIONS: "false"
      RUN_COLLECTSTATIC: "false"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/srv/static:ro
      - media_data:/srv/media:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--output-document=-", "http://127.0.0.1/nginx-health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - backend
