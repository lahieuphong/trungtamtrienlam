name: ${COMPOSE_PROJECT_NAME:-trungtamtrienlam-backend-prod}

x-backend-environment: &backend-environment
  PYTHONDONTWRITEBYTECODE: '1'
  POETRY_VIRTUALENVS_CREATE: 'false'
  POETRY_VIRTUALENVS_IN_PROJECT: 'false'
  DATABASE_URL: postgres://trungtamtrienlam:${POSTGRES_PASSWORD:-trungtamtrienlam}@postgres:5432/trungtamtrienlam
  REDIS_URL: redis://redis:6379/2
  CACHE_URL: rediscache://redis:6379/0?client_class=django_redis.client.DefaultClient
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  CELERY_TASK_ALWAYS_EAGER: 'false'
  PROJECT_SLUG: trungtamtrienlam-backend
  DOCKER_IMAGE: trungtamtrienlam-backend
  MEDIA_ROOT: /media
  MEDIA_URL: /media/

x-backend-service: &backend-service
  build:
    context: .
    args:
      BUILD_ENV: prod
    target: container-prod
    network: host
  environment: *backend-environment
  env_file:
    - ${BACKEND_ENV_FILE:-.env.local}
  volumes:
    - ./app:/app
    - ./app/media:/media:rw
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - app-net

networks:
  app-net:
    name: ${APP_NETWORK_NAME:-trungtamtrienlam-backend-prod-net}
    driver: bridge

services:
  app:
    <<: *backend-service
    command:
      - daphne
      - -b
      - 0.0.0.0
      - -p
      - '8002'
      - root.asgi:application
    ports:
      - '127.0.0.1:${APP_PORT:-8003}:8002'
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8002)); s.close()
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  celery_worker:
    <<: *backend-service
    command:
      - celery
      - -A
      - root
      - worker
      - -l
      - info

  celery_beat:
    <<: *backend-service
    command:
      - celery
      - -A
      - root
      - beat
      - -l
      - info
      - -S
      - django

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trungtamtrienlam
      POSTGRES_USER: trungtamtrienlam
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trungtamtrienlam}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5434}:5432'
    healthcheck:
      test: [CMD-SHELL, pg_isready -U trungtamtrienlam -d trungtamtrienlam]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-net

volumes:
  postgres-data:
    name: ${POSTGRES_VOLUME_NAME:-trungtamtrienlam-backend-prod-postgres-data}
