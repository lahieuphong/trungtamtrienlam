{% extends 'registration/base.html' %}
{% load i18n %}

{% block container %}
<div style="display: flex; flex-direction: column; justify-content: center; align-items: center;
            width: 100%; height: 100%;">
    <div>
        <img src="https://eoh-production-backend-icon-kit.s3.ap-southeast-1.amazonaws.com/eoh-logo.png"
           style="width:100px; padding-bottom: 20px"/>
    </div>
    <h1 style="font-size: 32px">{% trans "Sign In" %}</h1>

    <div>
        <form style="padding-top: 20%; text-align: center" class="login" method="POST" action="">
            {% csrf_token %}
            {{ form.as_p }}
            {% if redirect_field_value %}
                <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
            {% endif %}
          <button style="font-size: 16px; padding: 5px 50px; border-radius: 25px; margin-top: 20px;
          background-color: #00979D; color: #FFFFFF; border-color: transparent"
          class="primaryAction" type="submit">{% trans "Sign In" %}</button>
        </form>
    </div>
</div>
{% endblock container %}
