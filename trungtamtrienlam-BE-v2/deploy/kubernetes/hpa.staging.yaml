apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: $PROJECT_SLUG-$ENVIRONMENT_NAME-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: $PROJECT_SLUG-$ENVIRONMENT_NAME-web
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 95

---

