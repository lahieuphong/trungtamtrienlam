[uwsgi]
procname = root
# Run as normal user
chdir = /app
module = root.wsgi
callable = application
disable-logging=True

# Use unix socket
http-socket = 0.0.0.0:80

## Performance tuning ##
enable-threads = true
single-interpreter = true
processes = 8
threads = 4
master = true
buffer-size = 4096
listen = 4096
max-requests = 1000

# Prevents OSError generation on writes
ignore-sigpipe = true
ignore-write-errors = true
disable-write-exception = true
